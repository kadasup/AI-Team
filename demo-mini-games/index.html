<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Team 練習範例：小遊戲樂園</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <span class="decor-dot decor-dot--1" aria-hidden="true"></span>
  <span class="decor-dot decor-dot--2" aria-hidden="true"></span>
  <span class="decor-dot decor-dot--3" aria-hidden="true"></span>

  <main class="page">
    <header class="hero">
      <span class="hero__badge">AI-Team 練習範例</span>
      <h1 class="hero__title"><span class="emoji">🎪</span> 小遊戲樂園</h1>
      <p class="hero__subtitle">
        歡迎光臨！這裡收藏了幾個好玩的小遊戲練習作品，
        點選下方卡片，馬上開始你的冒險吧 ✨
      </p>
    </header>

    <section class="card-grid">
      <a class="game-card game-card--lottery" href="lottery/index.html">
        <div class="game-card__emoji-wrap" aria-hidden="true">🎡</div>
        <h2 class="game-card__title">尾牙抽獎嘉年華</h2>
        <p class="game-card__desc">
          轉動幸運轉盤，看看今年尾牙誰是天選之人，獎品準備好了嗎？🎉
        </p>
        <span class="game-card__cta">開始抽獎 <span class="arrow">→</span></span>
      </a>

      <a class="game-card game-card--story" href="story/index.html">
        <div class="game-card__emoji-wrap" aria-hidden="true">🏝️</div>
        <h2 class="game-card__title">荒島求生大冒險</h2>
        <p class="game-card__desc">
          一場意外把你困在荒島上，靠智慧與運氣，你能安全回家嗎？
        </p>
        <span class="game-card__cta">展開冒險 <span class="arrow">→</span></span>
      </a>
    </section>

    <footer class="page-footer">Made with 💛 by AI-Team</footer>
  </main>
</body>
</html>
